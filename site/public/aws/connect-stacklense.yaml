AWSTemplateFormatVersion: "2010-09-09"
Description: >
  StackLense Connect — creates a cross-account IAM role and EventBridge rule
  so StackLense can watch ECR pushes and read your stack's runtime state.
  Read-only. No mutating permissions.

Parameters:
  ExternalId:
    Type: String
    Description: >
      Unique ID generated by StackLense for this project. Required to prevent
      "confused deputy" attacks. Copy from your StackLense connect page.
    AllowedPattern: "^[a-zA-Z0-9-]{16,64}$"
    ConstraintDescription: >
      Must be 16-64 chars, alphanumeric or hyphen.
  StackLenseAccountId:
    Type: String
    Default: "573631992878"
    Description: >
      The AWS account that StackLense runs in. This account will be granted
      sts:AssumeRole on the role this stack creates.
    AllowedPattern: "^[0-9]{12}$"

Resources:
  # ----------------------------------------------------------------------------
  # IAM role StackLense assumes to read your stack
  # ----------------------------------------------------------------------------
  StackLenseReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "StackLense-ReadOnly-${AWS::AccountId}"
      Description: Read-only role for StackLense to inspect your stack
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${StackLenseAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      Policies:
        - PolicyName: StackLenseReadOnlyAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ECR — describe repos and images
              - Effect: Allow
                Action:
                  - ecr:DescribeRepositories
                  - ecr:DescribeImages
                  - ecr:DescribeImageScanFindings
                  - ecr:ListImages
                  - ecr:GetRepositoryPolicy
                  - ecr:GetLifecyclePolicy
                Resource: "*"
              # ECS — describe clusters, services, tasks
              - Effect: Allow
                Action:
                  - ecs:DescribeClusters
                  - ecs:DescribeServices
                  - ecs:DescribeTasks
                  - ecs:DescribeTaskDefinition
                  - ecs:ListClusters
                  - ecs:ListServices
                  - ecs:ListTasks
                  - ecs:ListTaskDefinitions
                Resource: "*"
              # CloudWatch Logs — read log streams
              - Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                  - logs:GetLogEvents
                  - logs:FilterLogEvents
                Resource: "*"
              # S3 — list buckets and objects (no GetObject; we don't read content)
              - Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:ListBucket
                  - s3:GetBucketPolicy
                  - s3:GetBucketLocation
                  - s3:GetBucketTagging
                  - s3:GetBucketVersioning
                  - s3:GetBucketEncryption
                Resource: "*"
              # ELB / ALB — describe load balancers
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeRules
                Resource: "*"
              # WAF — check if WAF is configured (security blueprint signal)
              - Effect: Allow
                Action:
                  - wafv2:ListWebACLs
                  - wafv2:GetWebACL
                  - wafv2:GetWebACLForResource
                Resource: "*"
              # Secrets Manager — list (NOT read values)
              - Effect: Allow
                Action:
                  - secretsmanager:ListSecrets
                  - secretsmanager:DescribeSecret
                Resource: "*"
              # EventBridge — describe our own rule
              - Effect: Allow
                Action:
                  - events:DescribeRule
                  - events:ListRules
                  - events:ListTargetsByRule
                Resource: "*"

  # ----------------------------------------------------------------------------
  # EventBridge rule — fires on every ECR push, forwards to StackLense webhook
  # ----------------------------------------------------------------------------
  ECRPushRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "StackLense-ECRPush-${AWS::AccountId}"
      Description: Forwards ECR push events to StackLense for blueprint updates
      State: ENABLED
      EventPattern:
        source:
          - aws.ecr
        detail-type:
          - ECR Image Action
        detail:
          action-type:
            - PUSH
          result:
            - SUCCESS
      Targets:
        - Id: StackLenseWebhook
          # NOTE: the webhook target ARN below is StackLense's central event bus.
          # When StackLense's multi-tenant ingress is wired up (Step 5b prereq),
          # this ARN will point to a cross-account event bus.
          Arn: !Sub "arn:aws:events:us-east-1:${StackLenseAccountId}:event-bus/stacklense-tenant-events"
          RoleArn: !GetAtt EventBridgeForwardRole.Arn

  # ----------------------------------------------------------------------------
  # IAM role used by EventBridge to put events on StackLense's central bus
  # ----------------------------------------------------------------------------
  EventBridgeForwardRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "StackLense-EventForward-${AWS::AccountId}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ForwardToStackLenseBus
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub "arn:aws:events:us-east-1:${StackLenseAccountId}:event-bus/stacklense-tenant-events"

Outputs:
  RoleArn:
    Description: The IAM role ARN to paste back into StackLense
    Value: !GetAtt StackLenseReadOnlyRole.Arn
  ExternalIdEcho:
    Description: External ID used by this stack (for verification)
    Value: !Ref ExternalId
