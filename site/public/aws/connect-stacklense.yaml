AWSTemplateFormatVersion: "2010-09-09"
Description: >
  StackLense Connect — installs:
    (1) an EventBridge rule that forwards ECR push events to StackLense's
        webhook so blueprints update on every deploy, and
    (2) a read-only IAM role StackLense assumes to inspect your stack
        (ECR, ECS, S3, CloudWatch, Route 53, Secrets Manager metadata,
        Lambda, ELB) so we can build a real blueprint of your project
        without you having to describe it.

  Read-only. No mutating permissions. Cross-account access is gated by an
  ExternalId only StackLense knows.

Parameters:
  WebhookToken:
    Type: String
    Description: >
      Per-project webhook token. Pre-filled by StackLense — don't edit.
    NoEcho: true
    AllowedPattern: "^[A-Za-z0-9_-]{32,128}$"
    ConstraintDescription: >
      Should be 32-128 chars, alphanumeric/underscore/dash.
  StackLenseAccountId:
    Type: String
    Description: >
      The AWS account StackLense runs in. Pre-filled by StackLense.
    AllowedPattern: "^[0-9]{12}$"
    Default: "573631992878"

Resources:
  # ============================================================================
  # PART 1 — Outbound webhook for ECR push events
  # ============================================================================

  StackLenseConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: !Sub "StackLense-${AWS::AccountId}"
      Description: Auth header for StackLense webhook
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: X-StackLense-Token
          ApiKeyValue: !Ref WebhookToken

  StackLenseApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Sub "StackLense-Webhook-${AWS::AccountId}"
      Description: StackLense webhook for ECR push events
      ConnectionArn: !GetAtt StackLenseConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Sub "https://stacklense.com/api/webhooks/aws/${WebhookToken}"

  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "StackLense-Invoke-${AWS::AccountId}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeStackLenseApiDestination
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt StackLenseApiDestination.Arn

  ECRPushRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "StackLense-ECRPush-${AWS::AccountId}"
      Description: Forwards ECR push events to StackLense
      State: ENABLED
      EventPattern:
        source:
          - aws.ecr
        detail-type:
          - ECR Image Action
        detail:
          action-type:
            - PUSH
          result:
            - SUCCESS
      Targets:
        - Id: StackLenseWebhook
          Arn: !GetAtt StackLenseApiDestination.Arn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  # ============================================================================
  # PART 2 — Read-only role StackLense assumes to inspect your stack
  # ============================================================================
  #
  # Predictable name so StackLense can construct the role ARN from your
  # account ID alone. ExternalId condition prevents anyone other than the
  # StackLense AWS principal from assuming the role.

  StackLenseReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "StackLense-ReadOnly-${AWS::AccountId}"
      Description: Read-only role StackLense uses to discover your stack
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${StackLenseAccountId}:user/stacklense-discovery"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref WebhookToken
      Policies:
        - PolicyName: StackLenseReadOnlyAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ECR — list and describe repos and images
              - Effect: Allow
                Action:
                  - ecr:DescribeRepositories
                  - ecr:DescribeImages
                  - ecr:DescribeImageScanFindings
                  - ecr:ListImages
                  - ecr:GetRepositoryPolicy
                  - ecr:GetLifecyclePolicy
                Resource: "*"
              # ECS — clusters, services, task definitions
              - Effect: Allow
                Action:
                  - ecs:DescribeClusters
                  - ecs:DescribeServices
                  - ecs:DescribeTasks
                  - ecs:DescribeTaskDefinition
                  - ecs:ListClusters
                  - ecs:ListServices
                  - ecs:ListTasks
                  - ecs:ListTaskDefinitions
                Resource: "*"
              # S3 — list buckets and read metadata (NOT GetObject; we don't read content)
              - Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:ListBucket
                  - s3:GetBucketPolicy
                  - s3:GetBucketLocation
                  - s3:GetBucketTagging
                  - s3:GetBucketVersioning
                  - s3:GetBucketEncryption
                  - s3:GetBucketWebsite
                Resource: "*"
              # CloudWatch Logs — log group metadata
              - Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: "*"
              # ELB / ALB
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeRules
                Resource: "*"
              # Route 53 — hosted zones for domain inference
              - Effect: Allow
                Action:
                  - route53:ListHostedZones
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                Resource: "*"
              # Secrets Manager — list secret names only (no GetSecretValue)
              - Effect: Allow
                Action:
                  - secretsmanager:ListSecrets
                  - secretsmanager:DescribeSecret
                Resource: "*"
              # WAF — Web ACL inventory
              - Effect: Allow
                Action:
                  - wafv2:ListWebACLs
                  - wafv2:GetWebACL
                  - wafv2:GetWebACLForResource
                Resource: "*"
              # Lambda
              - Effect: Allow
                Action:
                  - lambda:ListFunctions
                  - lambda:GetFunctionConfiguration
                  - lambda:ListTags
                Resource: "*"
              # CloudFront
              - Effect: Allow
                Action:
                  - cloudfront:ListDistributions
                  - cloudfront:GetDistribution
                Resource: "*"
              # API Gateway
              - Effect: Allow
                Action:
                  - apigateway:GET
                Resource: "*"
              # RDS
              - Effect: Allow
                Action:
                  - rds:DescribeDBInstances
                  - rds:DescribeDBClusters
                Resource: "*"
              # DynamoDB
              - Effect: Allow
                Action:
                  - dynamodb:ListTables
                  - dynamodb:DescribeTable
                Resource: "*"
              # EventBridge — describe own rule
              - Effect: Allow
                Action:
                  - events:DescribeRule
                  - events:ListRules
                  - events:ListTargetsByRule
                Resource: "*"

Outputs:
  RuleName:
    Description: The EventBridge rule name
    Value: !Ref ECRPushRule
  WebhookEndpoint:
    Description: The StackLense webhook URL events are sent to
    Value: !Sub "https://stacklense.com/api/webhooks/aws/${WebhookToken}"
  ReadOnlyRoleArn:
    Description: The read-only role StackLense assumes to inspect your stack
    Value: !GetAtt StackLenseReadOnlyRole.Arn
