AWSTemplateFormatVersion: "2010-09-09"
Description: >
  StackLense Connect — sets up an EventBridge rule in your AWS account that
  forwards ECR push events to StackLense's webhook so blueprints update on
  every deploy. No IAM role assumption, no cross-account access — purely
  outbound webhooks. Read-only.

Parameters:
  WebhookToken:
    Type: String
    Description: >
      Per-project webhook token, generated by StackLense. Pre-filled if you
      opened this stack via the StackLense UI. Don't edit unless StackLense
      told you to.
    NoEcho: true
    AllowedPattern: "^[A-Za-z0-9_-]{32,128}$"
    ConstraintDescription: >
      Should be 32-128 chars, alphanumeric/underscore/dash.

Resources:
  # ----------------------------------------------------------------------------
  # Connection — defines auth header for the API destination. We send the
  # token as an HTTP header on every request so StackLense can validate.
  # ----------------------------------------------------------------------------
  StackLenseConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: !Sub "StackLense-${AWS::AccountId}"
      Description: Auth header for StackLense webhook
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: X-StackLense-Token
          ApiKeyValue: !Ref WebhookToken

  # ----------------------------------------------------------------------------
  # API destination — the StackLense webhook endpoint
  # ----------------------------------------------------------------------------
  StackLenseApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Sub "StackLense-Webhook-${AWS::AccountId}"
      Description: StackLense webhook for ECR push events
      ConnectionArn: !GetAtt StackLenseConnection.Arn
      HttpMethod: POST
      InvocationEndpoint: !Sub "https://stacklense.com/api/webhooks/aws/${WebhookToken}"

  # ----------------------------------------------------------------------------
  # IAM role — EventBridge needs permission to invoke the API destination.
  # No cross-account permissions, no read access to your stack — just enough
  # to deliver events to the webhook above.
  # ----------------------------------------------------------------------------
  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "StackLense-Invoke-${AWS::AccountId}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeStackLenseApiDestination
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: events:InvokeApiDestination
                Resource: !GetAtt StackLenseApiDestination.Arn

  # ----------------------------------------------------------------------------
  # EventBridge rule — fires on every successful ECR push
  # ----------------------------------------------------------------------------
  ECRPushRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "StackLense-ECRPush-${AWS::AccountId}"
      Description: Forwards ECR push events to StackLense
      State: ENABLED
      EventPattern:
        source:
          - aws.ecr
        detail-type:
          - ECR Image Action
        detail:
          action-type:
            - PUSH
          result:
            - SUCCESS
      Targets:
        - Id: StackLenseWebhook
          Arn: !GetAtt StackLenseApiDestination.Arn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

Outputs:
  RuleName:
    Description: The EventBridge rule name
    Value: !Ref ECRPushRule
  WebhookEndpoint:
    Description: The StackLense webhook URL events are sent to
    Value: !Sub "https://stacklense.com/api/webhooks/aws/${WebhookToken}"
